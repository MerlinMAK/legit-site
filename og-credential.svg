<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#10131c"/><stop offset="60%" stop-color="#08090d"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171a24"/><stop offset="100%" stop-color="#12141c"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#27d07c" stop-opacity="0.20"/><stop offset="70%" stop-color="#27d07c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2330"/><stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left: pitch -->
  <g transform="translate(72,150)">
    <g transform="translate(0,0)">
      <circle cx="7" cy="-4" r="7" fill="#27d07c"/>
      <text x="26" y="2" fill="#27d07c" font-size="20" letter-spacing="2" font-weight="600">THE ACCOUNTABILITY LAYER FOR AI AGENTS</text>
    </g>
    <text x="0" y="92" fill="#ffffff" font-size="74" font-weight="800" letter-spacing="-2">Give your AI agent</text>
    <text x="0" y="168" fill="#9fb0c9" font-size="74" font-weight="800" letter-spacing="-2">its papers.</text>

    <!-- command chip -->
    <g transform="translate(0,232)">
      <rect width="430" height="64" rx="14" fill="#0b0d13" stroke="#333949"/>
      <text x="24" y="41" font-family="ui-monospace,Menlo,monospace" font-size="26" fill="#27d07c">$</text>
      <text x="48" y="41" font-family="ui-monospace,Menlo,monospace" font-size="26" fill="#eef1f7">npx legit init</text>
    </g>
    <text x="0" y="344" fill="#9aa3b6" font-size="22">A real, KYC-rooted US company — free.</text>
    <text x="0" y="376" fill="#6b7488" font-size="20">Verify the signature yourself.</text>
  </g>

  <!-- right: credential card -->
  <g transform="translate(720,118)">
    <rect width="408" height="394" rx="22" fill="url(#card)" stroke="#333949"/>
    <rect width="408" height="394" rx="22" fill="url(#glow)"/>

    <!-- avatar + handle -->
    <g transform="translate(28,30)">
      <rect width="58" height="58" rx="15" fill="url(#av)" stroke="#333949"/>
      <text x="29" y="40" text-anchor="middle" fill="#cceeff" font-size="26" font-weight="800">O</text>
      <text x="76" y="26" fill="#eef1f7" font-size="24" font-weight="700">@orion-labs</text>
      <circle cx="232" cy="19" r="11" fill="#27d07c"/>
      <path d="M227 19 l3.5 3.5 L237 15" stroke="#04130a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="50" fill="#9aa3b6" font-size="16">Accountable Operator Credential</text>
    </g>

    <!-- rooted banner -->
    <g transform="translate(28,112)">
      <rect width="352" height="44" rx="11" fill="#0f2a1c" stroke="#15a35e"/>
      <circle cx="24" cy="22" r="5" fill="#27d07c"/>
      <text x="42" y="28" fill="#27d07c" font-size="16" font-weight="700">ROOTED — verified human at the root</text>
    </g>

    <!-- rows -->
    <g transform="translate(28,184)" font-size="15">
      <line x1="0" y1="-12" x2="352" y2="-12" stroke="#262a37"/>
      <text x="0" y="14" fill="#6b7488">Entity</text>
      <text x="352" y="14" text-anchor="end" fill="#eef1f7" font-family="ui-monospace,Menlo,monospace" font-size="13">Orion Labs · DE series</text>
      <text x="0" y="48" fill="#6b7488">Standing</text>
      <text x="352" y="48" text-anchor="end" fill="#27d07c" font-family="ui-monospace,Menlo,monospace" font-size="13">Active · good standing</text>
      <text x="0" y="82" fill="#6b7488">Web Pass</text>
      <text x="352" y="82" text-anchor="end" fill="#eef1f7" font-family="ui-monospace,Menlo,monospace" font-size="13">Ed25519 · RFC 9421</text>
    </g>

    <!-- verify button -->
    <g transform="translate(28,300)">
      <rect width="352" height="50" rx="12" fill="#27d07c"/>
      <text x="176" y="32" text-anchor="middle" fill="#04130a" font-size="17" font-weight="700">✓ Signature valid — verify yourself</text>
    </g>
  </g>

  <text x="600" y="598" text-anchor="middle" fill="#6b7488" font-family="ui-monospace,Menlo,monospace" font-size="17">getlegit.com  ·  rooted with Legit  ·  npx legit init</text>
</svg>
